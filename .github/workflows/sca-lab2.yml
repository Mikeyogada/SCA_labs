name: sca-lab2

# SCA pipeline stages
# 1. Manifest validation
# 2. Diff-aware dependency scan (PR)
# 3. Full SCA scan before merge (PR safety net)
# 4. Policy enforcement before merge
# 5. Post-merge verification
# 6. Nightly vulnerability scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, sca-2 ]
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  sca:
    runs-on: ubuntu-latest

    steps:
# -----------------------------------
# Setup
# -----------------------------------
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit jq

# -----------------------------------
# 1. Manifest validation
# -----------------------------------
      - name: Ensure every service has requirements.txt
        run: |
          for dir in app/services/*; do
            if [ -d "$dir" ] && [ ! -f "$dir/requirements.txt" ]; then
              echo "Error: $dir missing requirements.txt"
              exit 1
            fi
          done

# -----------------------------------
# Prepare directories
# -----------------------------------
      - name: Create report directories
        run: |
          mkdir -p reports nightly_reports

# -----------------------------------
# 2. Diff-aware scan (PR)
# -----------------------------------
      - name: Diff-aware SCA scan
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | grep requirements.txt || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No dependency changes detected"
          else
            for file in $CHANGED_FILES; do
              service=$(basename $(dirname "$file"))

              echo "Scanning changed dependencies for $service"

              pip-audit -r "$file" --format json > "reports/${service}_diff.json" || true

              echo "----- Diff Report: $service -----"
              jq '.dependencies[] | {name: .name, vulns: (.vulns | length)}' \
                "reports/${service}_diff.json" 2>/dev/null || echo "No vulns"
            done
          fi

# -----------------------------------
# 3. Full scan (PR safety net)
# -----------------------------------
      - name: Full SCA scan (PR safety net)
        if: github.event_name == 'pull_request'
        run: |
          echo "Running full SCA scan..."

          for file in $(find app/services -name "requirements.txt"); do
            service=$(basename "$(dirname "$file")")

            pip-audit -r "$file" --format json > "reports/${service}_full.json" || true
          done

# -----------------------------------
# 4. Policy enforcement (PR gate)
# -----------------------------------
      - name: Enforce vulnerability policy
        if: github.event_name == 'pull_request'
        run: |
          echo "Evaluating vulnerability policy..."

          echo "----- Combined Summary -----"
          jq '.dependencies[] | {package: .name, vulnerabilities: (.vulns | length)}' reports/*.json || true

          CRITICAL=$(jq '[.dependencies[].vulns[]? | select(.severity=="critical")] | length' reports/*.json 2>/dev/null || echo 0)

          echo "Critical vulnerabilities: $CRITICAL"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "Blocking PR due to critical vulnerabilities"
            exit 1
          fi

# -----------------------------------
# 5. Post-merge verification (main)
# -----------------------------------
      - name: Post-merge SCA verification
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Running post-merge verification..."

          git diff HEAD~1 HEAD -- app/services/*/requirements.txt || true

          for file in $(find app/services -name "requirements.txt"); do
            service=$(basename "$(dirname "$file")")

            pip-audit -r "$file" --format json > "reports/${service}_post.json" || true
          done

          HIGH_CRITICAL=$(jq '[.dependencies[].vulns[]? | select(.severity=="high" or .severity=="critical")] | length' reports/*.json 2>/dev/null || echo 0)

          echo "High + Critical vulnerabilities: $HIGH_CRITICAL"

            #count the number of high and critical vulnerabilities and fail the check if any are found
            if [ "$HIGH_CRITICAL" -gt 0 ]; then
                echo "High or critical vulnerabilities detected in the main branch. Failing the check."
                exit 1 #fail the check if high or critical vulnerabilities are found
            fi
        #nightly SCA Scan
        #this step is similar to the main branch SCA scan, but it runs on a schedule (daily at 3 AM) and it generates separate reports for each service. The reports are then uploaded as artifacts for later review. The check for high and critical vulnerabilities can be adjusted based on the organization's risk tolerance and policies.
        - name: Run nightly SCA scan
          if: github.event_name == 'schedule' #only run this step for scheduled events
          run: |
            echo "Running nightly dependency scan for all services..." #print a message to indicate the start of the nightly SCA scan

            for file in $(find app/services -name "requirements.txt"); do #loop through all the requirements.txt files in the app/services directory
              service_name=$(basename "$(dirname "$file")") #get the service name from the directory name
              
              pip-audit -r "$file" --format json > "nightly_reports/${service_name}_nightly_sca_report.json" || true #run pip-audit on the requirements.txt file and save the report in JSON format
            done

            echo "Nightly SCA scan completed. Reports generated in the nightly_reports directory."
        
        #upload reports as artifacts
        - name: Upload SCA reports
          if: github.event_name != 'schedule' #only run this step for non-scheduled events (push and pull_request)
          uses: actions/upload-artifact@v4 #use the upload-artifact action to upload
          with:
            name: sca-reports #name of the artifact
            path: reports/ #path to the reports directory

        #Upload nightly reports as artifacts for later review
        - name: Upload nightly SCA reports
          if: github.event_name == 'schedule' #only run this step for scheduled events
          uses: actions/upload-artifact@v4 #use the upload-artifact action to upload
          with:
            name: nightly-sca-reports #name of the artifact
            path: nightly_reports/ #path to the nightly reports directory

        #step to show which manifest were scanned in the workflow run
        - name: Show scanned manifest files
          run: |
            echo "Scanned manifest files:" #print a message to indicate the scanned manifest files
            find app/services -name "requirements.txt" #list all the requirements.txt files that were
        

          if [ "$HIGH_CRITICAL" -gt 0 ]; then
            echo "Post-merge risk detected"
            exit 1
          fi

# -----------------------------------
# 6. Nightly scan
# -----------------------------------
      - name: Nightly SCA scan
        if: github.event_name == 'schedule'
        run: |
          echo "Running nightly scan..."

          for file in $(find app/services -name "requirements.txt"); do
            service=$(basename "$(dirname "$file"))

            pip-audit -r "$file" --format json > "nightly_reports/${service}.json" || true
          done

          jq '[.dependencies[].vulns[]?.id]' nightly_reports/*.json > nightly_reports/current_vulns.json

# -----------------------------------
# Artifacts
# -----------------------------------
      - name: Upload reports
        if: github.event_name != 'schedule'
        uses: actions/upload-artifact@v3
        with:
          name: sca-reports
          path: reports/

      - name: Upload nightly reports
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v3
        with:
          name: nightly-sca-reports
          path: nightly_reports/

# -----------------------------------
# Visibility
# -----------------------------------
      - name: Show scanned manifests
        run: |
          echo "Scanned manifest files:"
          find app/services -name "requirements.txt"